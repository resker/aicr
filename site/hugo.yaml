baseURL: https://aicr.dgxc.io/
title: NVIDIA AI Cluster Runtime
enableGitInfo: true
enableRobotsTXT: true
defaultContentLanguage: en
defaultContentLanguageInSubdir: false

module:
  hugoVersion:
    extended: true
    min: 0.110.0
  imports:
    - path: github.com/google/docsy
      disable: false

languages:
  en:
    languageName: English
    weight: 1
    contentDir: content

markup:
  goldmark:
    parser:
      attribute:
        block: true
    renderer:
      unsafe: true
  highlight:
    style: tango

outputs:
  home:
    - HTML
    - print
  section:
    - HTML
    - print

params:
  taxonomy:
    taxonomyCloud: []
    taxonomyCloudTitle: []
    taxonomyPageHeader: []
  ui:
    navbar_logo: false
    sidebar_menu_compact: true
    sidebar_menu_foldable: true
    sidebar_search_disable: false
    breadcrumb_disable: false
    feedback:
      enable: false
    readingtime:
      enable: true
  offlineSearch: true
  offlineSearchSummaryLength: 200
  mermaid:
    enable: true
  github_repo: https://github.com/NVIDIA/aicr
  github_project_repo: https://github.com/NVIDIA/aicr
  github_branch: main

menu:
  main:
    - name: Documentation
      url: /docs/
      weight: 10
    - name: GitHub
      url: https://github.com/NVIDIA/aicr
      weight: 90
      pre: <i class='fab fa-github'></i>

privacy:
  googleAnalytics:
    disabled: true
