name: GPU Inference Test (nvkind + H100)

on:
  schedule:
    - cron: '15 6,18 * * *'  # Every 12 hours (2x daily), offset from T4 smoke test
  push:
    branches:
      - "pull-request/[0-9]+"
    paths:
      - '.github/workflows/gpu-h100-inference-test.yaml'
      - '.github/actions/gpu-cluster-setup/**'
      - '.github/actions/gpu-operator-install/**'
      - '.github/actions/eidos-build/**'
      - '.github/actions/gpu-test-cleanup/**'
      - '.github/actions/load-versions/**'
      - 'tests/manifests/**'
      - 'tests/chainsaw/ai-conformance/**'
      - 'docs/conformance/cncf/**'
      - 'recipes/components/dynamo-platform/**'
      - 'recipes/overlays/kind.yaml'
      - 'recipes/overlays/kind-inference.yaml'
      - 'recipes/overlays/h100-kind-inference.yaml'
      - 'recipes/overlays/h100-kind-inference-dynamo.yaml'
  workflow_dispatch: {}  # Allow manual runs

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  gpu-inference-test:
    name: GPU Inference Test (nvkind + H100)
    runs-on: linux-amd64-gpu-h100-latest-1
    timeout-minutes: 45

    env:
      KIND_CLUSTER_NAME: gpu-inference-test

    steps:

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up GPU cluster
        uses: ./.github/actions/gpu-cluster-setup

      - name: Build eidos
        uses: ./.github/actions/eidos-build

      - name: Install GPU operator (bundle)
        uses: ./.github/actions/gpu-operator-install
        with:
          method: bundle
          accelerator: h100
          platform: dynamo

      # --- Snapshot and validation ---

      - name: Run eidos snapshot
        run: |
          ./eidos snapshot --deploy-agent \
            --kubeconfig="${HOME}/.kube/config" \
            --namespace=default \
            --image=ko.local:smoke-test \
            --require-gpu \
            --output=snapshot.yaml
          echo "--- Snapshot output ---"
          cat snapshot.yaml

      - name: Validate snapshot detected GPU
        run: |
          GPU_MODEL=$(yq eval '.measurements[] | select(.type == "GPU") | .subtypes[0].data["gpu.model"]' snapshot.yaml)
          GPU_COUNT=$(yq eval '.measurements[] | select(.type == "GPU") | .subtypes[0].data["gpu-count"]' snapshot.yaml)
          echo "GPU model: ${GPU_MODEL}"
          echo "GPU count: ${GPU_COUNT}"
          if [[ "${GPU_MODEL}" != *"H100"* ]]; then
            echo "::error::Expected H100 GPU in snapshot, got: ${GPU_MODEL}"
            exit 1
          fi
          if [[ "${GPU_COUNT}" -lt 1 ]]; then
            echo "::error::Expected gpu-count >= 1, got: ${GPU_COUNT}"
            exit 1
          fi
          echo "Snapshot correctly detected ${GPU_COUNT}x ${GPU_MODEL}"

      - name: Validate cluster
        run: |
          ./eidos validate \
            --recipe recipe.yaml \
            --phase readiness \
            --phase deployment \
            --phase conformance \
            --namespace gpu-operator \
            --kubeconfig="${HOME}/.kube/config" \
            --require-gpu \
            --image=ko.local:smoke-test

      - name: Install chainsaw
        run: |
          CHAINSAW_VERSION=$(yq eval '.testing_tools.chainsaw' .settings.yaml)
          GOFLAGS= go install "github.com/kyverno/chainsaw@${CHAINSAW_VERSION}"
          chainsaw version

      - name: Run chainsaw health checks
        run: |
          chainsaw test \
            --test-dir tests/chainsaw/ai-conformance/kind \
            --config tests/chainsaw/chainsaw-config.yaml

      # --- Inference Gateway validation (CNCF AI Conformance #6) ---

      - name: Validate inference gateway
        run: |
          echo "=== GatewayClass ==="
          GC_STATUS=$(kubectl --context="kind-${KIND_CLUSTER_NAME}" \
            get gatewayclass kgateway \
            -o jsonpath='{.status.conditions[?(@.type=="Accepted")].status}' 2>/dev/null)
          echo "GatewayClass accepted: ${GC_STATUS}"
          if [[ "${GC_STATUS}" != "True" ]]; then
            echo "::error::GatewayClass 'kgateway' not accepted"
            kubectl --context="kind-${KIND_CLUSTER_NAME}" get gatewayclass -o yaml 2>/dev/null || true
            exit 1
          fi

          echo "=== Gateway ==="
          GW_STATUS=$(kubectl --context="kind-${KIND_CLUSTER_NAME}" \
            get gateway inference-gateway -n kgateway-system \
            -o jsonpath='{.status.conditions[?(@.type=="Programmed")].status}' 2>/dev/null)
          echo "Gateway programmed: ${GW_STATUS}"
          if [[ "${GW_STATUS}" != "True" ]]; then
            echo "::error::Gateway 'inference-gateway' not programmed"
            kubectl --context="kind-${KIND_CLUSTER_NAME}" \
              get gateway inference-gateway -n kgateway-system -o yaml 2>/dev/null || true
            exit 1
          fi

          echo "=== Gateway API CRDs ==="
          kubectl --context="kind-${KIND_CLUSTER_NAME}" get crds 2>/dev/null | \
            grep -E "gateway\.networking\.k8s\.io" || true

          echo "=== Inference extension CRDs ==="
          kubectl --context="kind-${KIND_CLUSTER_NAME}" get crds 2>/dev/null | \
            grep -E "inference\.networking" || true

          echo "Inference gateway validation passed."

      # --- Dynamo vLLM inference smoke test ---

      - name: Deploy Dynamo vLLM smoke test
        run: |
          kubectl --context="kind-${KIND_CLUSTER_NAME}" apply \
            -f tests/manifests/dynamo-vllm-smoke-test.yaml -n dynamo-system

          echo "Waiting for DynamoGraphDeployment to be reconciled..."
          for i in $(seq 1 60); do
            PHASE=$(kubectl --context="kind-${KIND_CLUSTER_NAME}" -n dynamo-system \
              get dynamographdeployment vllm-smoke-test \
              -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null)
            if [[ "${PHASE}" == "True" ]]; then
              echo "DynamoGraphDeployment is ready."
              break
            fi
            echo "Waiting for DGD readiness... (${i}/60)"
            kubectl --context="kind-${KIND_CLUSTER_NAME}" -n dynamo-system get pods 2>/dev/null || true
            sleep 10
          done

          if [[ "${PHASE}" != "True" ]]; then
            echo "::error::DynamoGraphDeployment did not become ready within 10 minutes"
            kubectl --context="kind-${KIND_CLUSTER_NAME}" -n dynamo-system \
              get dynamographdeployment vllm-smoke-test -o yaml 2>/dev/null || true
            exit 1
          fi

          echo "Dynamo pods:"
          kubectl --context="kind-${KIND_CLUSTER_NAME}" -n dynamo-system get pods

      - name: Validate Dynamo inference
        run: |
          kubectl --context="kind-${KIND_CLUSTER_NAME}" -n dynamo-system \
            port-forward svc/vllm-smoke-test-frontend 8000:8000 &
          PF_PID=$!
          sleep 3

          cleanup() { kill "${PF_PID}" 2>/dev/null || true; }
          trap cleanup EXIT

          echo "=== Checking /v1/models ==="
          MODELS=$(curl -sf http://localhost:8000/v1/models)
          echo "${MODELS}" | jq .
          if ! echo "${MODELS}" | jq -e '.data | length > 0' >/dev/null 2>&1; then
            echo "::error::No models reported by frontend"
            exit 1
          fi

          echo "=== Sending chat completion ==="
          RESPONSE=$(curl -sf http://localhost:8000/v1/chat/completions \
            -H "Content-Type: application/json" \
            -d '{"model":"Qwen/Qwen3-0.6B","messages":[{"role":"user","content":"What is 2+2?"}],"max_tokens":30,"stream":false}')
          echo "${RESPONSE}" | jq .

          CONTENT=$(echo "${RESPONSE}" | jq -r '.choices[0].message.content')
          if [[ -z "${CONTENT}" || "${CONTENT}" == "null" ]]; then
            echo "::error::Empty response from vLLM"
            exit 1
          fi
          echo "Dynamo vLLM inference smoke test passed."

      # --- Accelerator & AI Service Metrics validation (CNCF AI Conformance #4/#5) ---

      - name: Validate accelerator metrics
        run: |
          echo "=== DCGM Exporter pod ==="
          kubectl --context="kind-${KIND_CLUSTER_NAME}" -n gpu-operator \
            get pods -l app=nvidia-dcgm-exporter -o wide
          DCGM_POD=$(kubectl --context="kind-${KIND_CLUSTER_NAME}" -n gpu-operator \
            get pods -l app=nvidia-dcgm-exporter -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
          if [[ -z "${DCGM_POD}" ]]; then
            echo "::error::DCGM Exporter pod not found"
            exit 1
          fi
          echo "DCGM Exporter pod: ${DCGM_POD}"

          echo "=== Query DCGM metrics endpoint ==="
          METRICS=$(kubectl --context="kind-${KIND_CLUSTER_NAME}" run dcgm-probe \
            --rm -i --restart=Never --image=curlimages/curl \
            -- curl -sf http://nvidia-dcgm-exporter.gpu-operator.svc:9400/metrics 2>/dev/null)

          for METRIC in DCGM_FI_DEV_GPU_UTIL DCGM_FI_DEV_FB_USED DCGM_FI_DEV_GPU_TEMP DCGM_FI_DEV_POWER_USAGE; do
            if echo "${METRICS}" | grep -q "^${METRIC}"; then
              echo "${METRIC}: $(echo "${METRICS}" | grep "^${METRIC}" | head -1)"
            else
              echo "::warning::Metric ${METRIC} not found in DCGM output"
            fi
          done

          echo "=== Prometheus scraping GPU metrics ==="
          kubectl --context="kind-${KIND_CLUSTER_NAME}" -n monitoring \
            port-forward svc/kube-prometheus-prometheus 9090:9090 &
          PF_PID=$!
          sleep 3

          cleanup_pf() { kill "${PF_PID}" 2>/dev/null || true; }
          trap cleanup_pf EXIT

          for METRIC in DCGM_FI_DEV_GPU_UTIL DCGM_FI_DEV_FB_USED DCGM_FI_DEV_GPU_TEMP DCGM_FI_DEV_POWER_USAGE; do
            RESULT=$(curl -sf "http://localhost:9090/api/v1/query?query=${METRIC}" 2>/dev/null)
            COUNT=$(echo "${RESULT}" | jq -r '.data.result | length' 2>/dev/null)
            if [[ "${COUNT}" -gt 0 ]]; then
              echo "${METRIC}: ${COUNT} time series in Prometheus"
            else
              echo "::warning::${METRIC} not found in Prometheus (may need more scrape time)"
            fi
          done

          kill "${PF_PID}" 2>/dev/null || true
          trap - EXIT

          echo "=== Custom Metrics API ==="
          CUSTOM_METRICS=$(kubectl --context="kind-${KIND_CLUSTER_NAME}" \
            get --raw /apis/custom.metrics.k8s.io/v1beta1 2>/dev/null)
          if [[ -n "${CUSTOM_METRICS}" ]]; then
            echo "Custom metrics API is available"
            echo "${CUSTOM_METRICS}" | jq -r '.resources[].name' 2>/dev/null | head -20 || true
          else
            echo "::warning::Custom metrics API not available (prometheus-adapter may need time)"
          fi

          echo "Accelerator metrics validation passed."

      # --- DRA GPU allocation test ---

      - name: Deploy DRA GPU test
        run: |
          kubectl --context="kind-${KIND_CLUSTER_NAME}" apply \
            -f docs/conformance/cncf/manifests/dra-gpu-test.yaml

          echo "Waiting for DRA GPU test pod to complete..."
          if kubectl --context="kind-${KIND_CLUSTER_NAME}" -n dra-test \
            wait --for=jsonpath='{.status.phase}'=Succeeded pod/dra-gpu-test --timeout=120s; then
            echo "DRA GPU allocation test passed."
          else
            echo "::error::DRA GPU test pod did not succeed"
            kubectl --context="kind-${KIND_CLUSTER_NAME}" -n dra-test \
              logs pod/dra-gpu-test 2>/dev/null || true
            kubectl --context="kind-${KIND_CLUSTER_NAME}" -n dra-test \
              get pod/dra-gpu-test -o yaml 2>/dev/null || true
            exit 1
          fi

          echo "=== DRA GPU test logs ==="
          kubectl --context="kind-${KIND_CLUSTER_NAME}" -n dra-test \
            logs pod/dra-gpu-test

      # --- Secure Accelerator Access validation (CNCF AI Conformance #3) ---

      - name: Validate secure accelerator access
        run: |
          echo "=== Verify DRA-mediated access (no hostPath, no device plugin) ==="

          # Check pod uses resourceClaims (DRA), not resources.limits (device plugin)
          RESOURCE_CLAIMS=$(kubectl --context="kind-${KIND_CLUSTER_NAME}" -n dra-test \
            get pod/dra-gpu-test -o jsonpath='{.spec.resourceClaims}' 2>/dev/null)
          if [[ -z "${RESOURCE_CLAIMS}" || "${RESOURCE_CLAIMS}" == "null" ]]; then
            echo "::error::Pod does not use DRA resourceClaims"
            exit 1
          fi
          echo "Pod uses DRA resourceClaims: ${RESOURCE_CLAIMS}"

          # Verify no nvidia.com/gpu in resources.limits (device plugin pattern)
          GPU_LIMITS=$(kubectl --context="kind-${KIND_CLUSTER_NAME}" -n dra-test \
            get pod/dra-gpu-test \
            -o jsonpath='{.spec.containers[0].resources.limits.nvidia\.com/gpu}' 2>/dev/null)
          if [[ -n "${GPU_LIMITS}" && "${GPU_LIMITS}" != "null" ]]; then
            echo "::error::Pod uses device plugin (nvidia.com/gpu limits) instead of DRA"
            exit 1
          fi
          echo "No device plugin resources.limits — GPU access via DRA only"

          # Verify no hostPath volumes to /dev/nvidia*
          VOLUMES=$(kubectl --context="kind-${KIND_CLUSTER_NAME}" -n dra-test \
            get pod/dra-gpu-test -o jsonpath='{.spec.volumes}' 2>/dev/null)
          if echo "${VOLUMES}" | grep -q "hostPath" && echo "${VOLUMES}" | grep -q "/dev/nvidia"; then
            echo "::error::Pod has hostPath volume mount to /dev/nvidia*"
            exit 1
          fi
          echo "No hostPath volumes to /dev/nvidia* — access is DRA-mediated"

          # Verify container security (no privilege escalation)
          PRIV_ESC=$(kubectl --context="kind-${KIND_CLUSTER_NAME}" -n dra-test \
            get pod/dra-gpu-test \
            -o jsonpath='{.spec.containers[0].securityContext.allowPrivilegeEscalation}' 2>/dev/null)
          echo "allowPrivilegeEscalation: ${PRIV_ESC}"

          # Verify only 1 GPU visible (allocated count matches)
          GPU_COUNT=$(kubectl --context="kind-${KIND_CLUSTER_NAME}" -n dra-test \
            logs pod/dra-gpu-test 2>/dev/null | grep -c "/dev/nvidia[0-9]" || echo "0")
          echo "GPU devices visible in container: ${GPU_COUNT}"
          if [[ "${GPU_COUNT}" -lt 1 ]]; then
            echo "::error::No GPU devices visible in container"
            exit 1
          fi

          echo "=== ResourceClaim allocation ==="
          kubectl --context="kind-${KIND_CLUSTER_NAME}" -n dra-test \
            get resourceclaim gpu-claim -o wide

          echo "Secure accelerator access validation passed."

      - name: DRA GPU test cleanup
        if: always()
        run: |
          kubectl --context="kind-${KIND_CLUSTER_NAME}" delete \
            -f docs/conformance/cncf/manifests/dra-gpu-test.yaml --ignore-not-found 2>/dev/null || true

      # --- Evidence collection ---

      - name: Collect AI conformance evidence
        if: always()
        run: |
          go run ./tests/chainsaw/ai-conformance/ \
            --dir tests/chainsaw/ai-conformance/kind \
            --file tests/chainsaw/ai-conformance/cluster/assert-crds.yaml \
            --file tests/chainsaw/ai-conformance/cluster/assert-cert-manager.yaml \
            --file tests/chainsaw/ai-conformance/cluster/assert-monitoring.yaml \
            --file tests/chainsaw/ai-conformance/cluster/assert-kgateway.yaml \
            --file tests/chainsaw/ai-conformance/cluster/assert-skyhook.yaml \
            --file tests/chainsaw/ai-conformance/cluster/assert-dra-driver.yaml \
            --file tests/chainsaw/ai-conformance/cluster/assert-kai-scheduler.yaml \
            --file tests/chainsaw/ai-conformance/cluster/assert-dynamo.yaml \
            --kubeconfig="${HOME}/.kube/config" \
            --debug

      - name: Debug diagnostics
        if: failure()
        run: |
          echo "=== ClusterPolicy status ==="
          kubectl --context="kind-${KIND_CLUSTER_NAME}" get clusterpolicy -o yaml 2>/dev/null || true
          echo "=== GPU Operator pods ==="
          kubectl --context="kind-${KIND_CLUSTER_NAME}" -n gpu-operator get pods -o wide 2>/dev/null || true
          echo "=== Non-running pods (all namespaces) ==="
          kubectl --context="kind-${KIND_CLUSTER_NAME}" get pods -A --field-selector=status.phase!=Running,status.phase!=Succeeded 2>/dev/null || true
          echo "=== Recent events (gpu-operator) ==="
          kubectl --context="kind-${KIND_CLUSTER_NAME}" -n gpu-operator get events --sort-by='.lastTimestamp' 2>/dev/null | tail -30 || true
          echo "=== Dynamo pods ==="
          kubectl --context="kind-${KIND_CLUSTER_NAME}" -n dynamo-system get pods -o wide 2>/dev/null || true
          echo "=== DynamoGraphDeployment status ==="
          kubectl --context="kind-${KIND_CLUSTER_NAME}" -n dynamo-system get dynamographdeployment -o yaml 2>/dev/null || true
          echo "=== Dynamo vLLM frontend logs ==="
          kubectl --context="kind-${KIND_CLUSTER_NAME}" -n dynamo-system \
            logs deployment/vllm-smoke-test-frontend --tail=200 2>/dev/null || true
          echo "=== Dynamo vLLM frontend previous logs ==="
          kubectl --context="kind-${KIND_CLUSTER_NAME}" -n dynamo-system \
            logs deployment/vllm-smoke-test-frontend --previous --tail=200 2>/dev/null || true
          echo "=== Dynamo vLLM worker logs ==="
          kubectl --context="kind-${KIND_CLUSTER_NAME}" -n dynamo-system \
            logs deployment/vllm-smoke-test-vllmdecodeworker --tail=200 2>/dev/null || true
          echo "=== Dynamo vLLM worker previous logs ==="
          kubectl --context="kind-${KIND_CLUSTER_NAME}" -n dynamo-system \
            logs deployment/vllm-smoke-test-vllmdecodeworker --previous --tail=200 2>/dev/null || true
          echo "=== Dynamo operator logs ==="
          kubectl --context="kind-${KIND_CLUSTER_NAME}" -n dynamo-system \
            logs deployment/dynamo-operator-controller-manager --tail=100 -c manager 2>/dev/null || true
          echo "=== Recent events (dynamo-system) ==="
          kubectl --context="kind-${KIND_CLUSTER_NAME}" -n dynamo-system get events --sort-by='.lastTimestamp' 2>/dev/null | tail -30 || true
          echo "=== kgateway pods ==="
          kubectl --context="kind-${KIND_CLUSTER_NAME}" -n kgateway-system get pods -o wide 2>/dev/null || true
          echo "=== GatewayClass status ==="
          kubectl --context="kind-${KIND_CLUSTER_NAME}" get gatewayclass -o yaml 2>/dev/null || true
          echo "=== Gateway status ==="
          kubectl --context="kind-${KIND_CLUSTER_NAME}" get gateways -A -o yaml 2>/dev/null || true
          echo "=== DCGM Exporter pods ==="
          kubectl --context="kind-${KIND_CLUSTER_NAME}" -n gpu-operator \
            get pods -l app=nvidia-dcgm-exporter -o wide 2>/dev/null || true
          echo "=== Monitoring pods ==="
          kubectl --context="kind-${KIND_CLUSTER_NAME}" -n monitoring get pods -o wide 2>/dev/null || true
          echo "=== DRA ResourceSlices ==="
          kubectl --context="kind-${KIND_CLUSTER_NAME}" get resourceslices -o wide 2>/dev/null || true
          echo "=== DRA test pod spec ==="
          kubectl --context="kind-${KIND_CLUSTER_NAME}" -n dra-test \
            get pod/dra-gpu-test -o yaml 2>/dev/null || true
          echo "=== Node status ==="
          kubectl --context="kind-${KIND_CLUSTER_NAME}" get nodes -o wide 2>/dev/null || true

      - name: Dynamo vLLM cleanup
        if: always()
        run: |
          kubectl --context="kind-${KIND_CLUSTER_NAME}" delete \
            -f tests/manifests/dynamo-vllm-smoke-test.yaml \
            -n dynamo-system --ignore-not-found 2>/dev/null || true

      - name: GPU Test Cleanup
        if: always()
        uses: ./.github/actions/gpu-test-cleanup
        with:
          cluster_name: ${{ env.KIND_CLUSTER_NAME }}
          artifact_name_prefix: gpu-inference-test-debug
