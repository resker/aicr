name: On Push Qualification

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  workflow_dispatch: {}  # Allow manual runs

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read
      contents: read
    steps:

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Load versions
        id: versions
        uses: ./.github/actions/load-versions

      - name: Run Go CI (setup, test, lint)
        uses: ./.github/actions/go-ci
        with:
          go_version: ${{ steps.versions.outputs.go }}
          golangci_lint_version: ${{ steps.versions.outputs.golangci_lint }}
          addlicense_version: ${{ steps.versions.outputs.addlicense }}
          coverage_report: 'true'
          coverage_threshold: ${{ steps.versions.outputs.coverage_threshold }}
          lint_timeout: ${{ steps.versions.outputs.lint_timeout }}

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Load versions
        id: versions
        uses: ./.github/actions/load-versions

      - name: Run Integration Tests
        uses: ./.github/actions/integration
        with:
          go_version: ${{ steps.versions.outputs.go }}

  chainsaw:
    name: AI-Conformance
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Load versions
        id: versions
        uses: ./.github/actions/load-versions

      - name: Setup Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5  # v6.2.0
        with:
          go-version: '${{ steps.versions.outputs.go }}'
          cache: true
          cache-dependency-path: |
            go.sum
            vendor/modules.txt
          check-latest: true

      - name: Install Chainsaw
        run: go install github.com/kyverno/chainsaw@v0.2.14

      - name: Build eidos binary
        env:
          GOFLAGS: -mod=vendor
        run: go build -o dist/e2e/eidos ./cmd/eidos

      - name: Run AI-conformance offline tests
        run: |
          EIDOS_BIN=$(pwd)/dist/e2e/eidos chainsaw test \
            --no-cluster \
            --config tests/chainsaw/chainsaw-config.yaml \
            --test-dir tests/chainsaw/ai-conformance/offline/

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Load versions
        id: versions
        uses: ./.github/actions/load-versions

      - name: Run E2E Tests
        uses: ./.github/actions/e2e
        with:
          go_version: ${{ steps.versions.outputs.go }}
