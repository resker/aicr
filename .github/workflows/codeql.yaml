name: "CodeQL"

on:
  push:
    branches:
      - main
      - "pull-request/[0-9]+"
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  schedule:
    - cron: '0 5 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/load-versions
        id: versions
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ steps.versions.outputs.go }}
      - uses: github/codeql-action/init@v3
        with:
          languages: go
      - run: go build ./...
      - uses: github/codeql-action/analyze@v3
