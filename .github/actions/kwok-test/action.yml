name: 'KWOK Cluster Test'
description: 'Test recipes using KWOK simulated nodes in a shared Kind cluster'

inputs:
  recipe:
    description: 'Recipe name to test (empty = all testable recipes)'
    required: false
    default: ''
  go_version:
    description: 'Go version to install'
    required: true
  kind_version:
    description: 'Kind version to install'
    required: false
    default: '0.31.0'
  helm_version:
    description: 'Helm version to install'
    required: false
    default: 'v4.1.0'
  kwok_version:
    description: 'KWOK version to install'
    required: false
    default: 'v0.7.0'
  kubectl_version:
    description: 'kubectl version to install'
    required: false
    default: 'v1.35.0'
  yq_version:
    description: 'yq version to install'
    required: false
    default: 'v4.52.4'
  kind_node_image:
    description: 'Kind node image for testing'
    required: false
    default: ''
  upload_artifacts:
    description: 'Whether to upload debug artifacts on failure'
    required: false
    default: 'true'
  artifact_retention_days:
    description: 'Number of days to retain debug artifacts'
    required: false
    default: '7'

runs:
  using: 'composite'
  steps:
    - name: Set up Go
      uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5  # v6.2.0
      with:
        go-version: ${{ inputs.go_version }}
        cache: false  # vendor/ provides deps; disable to save disk on constrained runners

    - name: Cache KWOK tools
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
      with:
        path: |
          /usr/local/bin/kind
          /usr/local/bin/helm
          /usr/local/bin/kubectl
          /usr/local/bin/yq
        key: kwok-tools-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.settings.yaml') }}

    - name: Free up disk space
      shell: bash
      run: |
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        docker system prune -f

    - name: Install Kind
      shell: bash
      run: |
        if [[ -x /usr/local/bin/kind ]]; then echo "kind already installed"; kind version; exit 0; fi
        curl -Lo ./kind https://kind.sigs.k8s.io/dl/v${{ inputs.kind_version }}/kind-linux-amd64
        chmod +x ./kind
        sudo mv ./kind /usr/local/bin/kind
        kind version

    - name: Install Helm
      shell: bash
      run: |
        if [[ -x /usr/local/bin/helm ]]; then echo "helm already installed"; helm version; exit 0; fi
        set -euo pipefail
        HELM_VERSION="${{ inputs.helm_version }}"
        HELM_VERSION="${HELM_VERSION#v}"
        HELM_BASE="https://get.helm.sh"
        HELM_TAR="helm-v${HELM_VERSION}-linux-amd64.tar.gz"
        HELM_TMP="$(mktemp -d)"
        curl -fsSL -o "${HELM_TMP}/${HELM_TAR}" "${HELM_BASE}/${HELM_TAR}"
        curl -fsSL -o "${HELM_TMP}/${HELM_TAR}.sha256sum" "${HELM_BASE}/${HELM_TAR}.sha256sum"
        EXPECTED=$(awk '{print $1}' "${HELM_TMP}/${HELM_TAR}.sha256sum")
        ACTUAL=$(sha256sum "${HELM_TMP}/${HELM_TAR}" | awk '{print $1}')
        if [[ "${ACTUAL}" != "${EXPECTED}" ]]; then
          echo "::error::helm checksum mismatch: expected ${EXPECTED}, got ${ACTUAL}"
          exit 1
        fi
        tar -xzf "${HELM_TMP}/${HELM_TAR}" -C "${HELM_TMP}"
        sudo mv "${HELM_TMP}/linux-amd64/helm" /usr/local/bin/helm
        sudo chmod +x /usr/local/bin/helm
        rm -rf "${HELM_TMP}"
        helm version

    - name: Install kubectl
      shell: bash
      run: |
        if [[ -x /usr/local/bin/kubectl ]]; then echo "kubectl already installed"; kubectl version --client; exit 0; fi
        ARCH=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
        curl -fsSL -o kubectl "https://dl.k8s.io/release/${{ inputs.kubectl_version }}/bin/linux/${ARCH}/kubectl"
        chmod +x kubectl
        sudo mv kubectl /usr/local/bin/kubectl
        kubectl version --client

    - name: Install yq
      shell: bash
      run: |
        if [[ -x /usr/local/bin/yq ]]; then echo "yq already installed"; yq --version; exit 0; fi
        YQ_VERSION="${{ inputs.yq_version }}"
        sudo wget -qO /usr/local/bin/yq \
          "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64"
        sudo chmod +x /usr/local/bin/yq
        yq --version

    - name: Prep system for Kind cluster
      shell: bash
      run: |
        sudo sysctl -w net.ipv4.ip_forward=1
        sudo sysctl -w fs.inotify.max_user_watches=524288
        sudo sysctl -w fs.inotify.max_user_instances=1024

    - name: Install GoReleaser
      uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a  # v6.4.0
      with:
        install-only: true

    - name: Build aicr binary
      shell: bash
      env:
        GOFLAGS: -mod=vendor
      run: |
        make build
        ls -la dist/

    - name: Run KWOK recipe tests
      id: validate
      shell: bash
      env:
        KWOK_CLUSTER: aicr-kwok-test
        KIND_NODE_IMAGE: ${{ inputs.kind_node_image }}
      run: |
        bash kwok/scripts/run-all-recipes.sh ${{ inputs.recipe }}

    - name: Collect debug artifacts
      if: failure()
      shell: bash
      env:
        KWOK_CLUSTER: aicr-kwok-test
      run: |
        mkdir -p /tmp/kwok-debug-artifacts
        kubectl get all --all-namespaces > /tmp/kwok-debug-artifacts/all-resources.txt || true
        kubectl get nodes -o wide > /tmp/kwok-debug-artifacts/nodes.txt || true
        kubectl get nodes -l type=kwok -o yaml > /tmp/kwok-debug-artifacts/kwok-nodes.yaml || true
        kubectl get events --all-namespaces --sort-by='.lastTimestamp' > /tmp/kwok-debug-artifacts/events.txt || true
        kubectl get pods --all-namespaces -o wide > /tmp/kwok-debug-artifacts/pods.txt || true

        # Get pending pod details
        for ns in $(kubectl get ns -o jsonpath='{.items[*].metadata.name}'); do
          for pod in $(kubectl get pods -n "$ns" --field-selector=status.phase=Pending -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
            kubectl describe pod -n "$ns" "$pod" > "/tmp/kwok-debug-artifacts/pending-${ns}-${pod}.txt" 2>/dev/null || true
          done
        done

    - name: Export Kind logs
      if: failure()
      shell: bash
      env:
        KWOK_CLUSTER: aicr-kwok-test
      run: |
        mkdir -p /tmp/kwok-kind-logs
        kind export logs /tmp/kwok-kind-logs --name "${KWOK_CLUSTER}" || true

    - name: Upload debug artifacts
      if: failure() && inputs.upload_artifacts == 'true'
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
      with:
        name: kwok-debug-${{ github.run_id }}
        path: |
          /tmp/kwok-debug-artifacts/
          /tmp/kwok-kind-logs/
        retention-days: ${{ inputs.artifact_retention_days }}

    - name: Cleanup
      if: always()
      shell: bash
      env:
        KWOK_CLUSTER: aicr-kwok-test
      run: |
        kind delete cluster --name "${KWOK_CLUSTER}" || true
        docker system prune -f || true
