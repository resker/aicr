# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: cli-bundle-scheduling
spec:
  description: |
    Validates that aicr recipe + bundle CLI commands produce correct output
    with scheduling options (system/accelerated node selectors and tolerations).
    No cluster needed -- purely CLI output validation.
    Run with: AICR_BIN=$(pwd)/dist/e2e/aicr chainsaw test --no-cluster --test-dir tests/chainsaw/cli/bundle-scheduling
  timeouts:
    exec: 30s
  steps:
    - name: generate-recipe
      description: Generate an EKS H100 training recipe.
      try:
        - script:
            content: |
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              WORK="/tmp/chainsaw-bundle-scheduling"
              rm -rf "${WORK}" && mkdir -p "${WORK}"
              ${AICR_BIN} recipe \
                --service eks \
                --accelerator h100 \
                --os ubuntu \
                --intent training \
                --output "${WORK}/recipe.yaml"

    - name: assert-recipe
      description: Verify recipe has correct kind, apiVersion, criteria, and at least one component.
      try:
        - script:
            content: |
              chainsaw assert \
                --resource /tmp/chainsaw-bundle-scheduling/recipe.yaml \
                --file ./assert-recipe.yaml \
                --no-color --timeout 5s

    - name: generate-bundle
      description: Generate a Helm bundle with system and accelerated node scheduling.
      try:
        - script:
            content: |
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              WORK="/tmp/chainsaw-bundle-scheduling"
              ${AICR_BIN} bundle \
                --recipe "${WORK}/recipe.yaml" \
                --output "${WORK}/bundle" \
                --system-node-selector nodeGroup=system-pool \
                --accelerated-node-selector nodeGroup=customer-gpu \
                --accelerated-node-toleration nvidia.com/gpu=present:NoSchedule

    # chainsaw assert requires apiVersion/kind, so we prepend a header
    # to the plain Helm values file. The assertion YAML validates that
    # selectors and tolerations land at the correct Helm value paths.
    - name: assert-gpu-operator-scheduling
      description: Verify gpu-operator values.yaml has node selectors and tolerations at correct Helm paths.
      try:
        - script:
            content: |
              WORK="/tmp/chainsaw-bundle-scheduling"
              printf 'apiVersion: helm/v1\nkind: Values\n' > "${WORK}/gpu-operator-values.yaml"
              sed '/^---$/d' "${WORK}/bundle/gpu-operator/values.yaml" >> "${WORK}/gpu-operator-values.yaml"
              chainsaw assert \
                --resource "${WORK}/gpu-operator-values.yaml" \
                --file ./assert-gpu-operator-values.yaml \
                --no-color --timeout 5s
      cleanup:
        - script:
            content: |
              rm -rf /tmp/chainsaw-bundle-scheduling
