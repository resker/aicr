# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: cli-bundle-variants
spec:
  description: |
    Tests bundle generation with all flag combinations: basic, system/accelerated
    node selectors and tolerations, value overrides (--set), combined flags,
    and ArgoCD deployer.
    Replaces run_bundle_tests() in tools/e2e.
    No cluster needed.
  timeouts:
    exec: 60s
  steps:
    - name: setup
      description: Generate recipe used by all bundle variant tests.
      try:
        - script:
            content: |
              EIDOS_BIN="${EIDOS_BIN:?Set EIDOS_BIN to the path of the eidos binary}"
              WORK="/tmp/chainsaw-bundle-variants"
              rm -rf "${WORK}" && mkdir -p "${WORK}"
              ${EIDOS_BIN} recipe --service eks --accelerator gb200 --os ubuntu \
                --intent training -o "${WORK}/recipe.yaml"

    - name: basic-bundle
      description: Basic bundle (no flags) produces valid structure with gpu-operator.
      try:
        - script:
            content: |
              EIDOS_BIN="${EIDOS_BIN:?Set EIDOS_BIN to the path of the eidos binary}"
              WORK="/tmp/chainsaw-bundle-variants"
              ${EIDOS_BIN} bundle -r "${WORK}/recipe.yaml" -o "${WORK}/basic"
              test -f "${WORK}/basic/deploy.sh"
              test -f "${WORK}/basic/README.md"
              test -f "${WORK}/basic/recipe.yaml"
              ls "${WORK}"/basic/*/values.yaml >/dev/null 2>&1
              test -d "${WORK}/basic/gpu-operator"
            check:
              ($error == null): true

    - name: system-node-selector
      description: --system-node-selector injects nodeGroup into component values.
      try:
        - script:
            content: |
              EIDOS_BIN="${EIDOS_BIN:?Set EIDOS_BIN to the path of the eidos binary}"
              WORK="/tmp/chainsaw-bundle-variants"
              ${EIDOS_BIN} bundle -r "${WORK}/recipe.yaml" -o "${WORK}/sys-sel" \
                --system-node-selector nodeGroup=system-pool
              found=false
              for vfile in "${WORK}"/sys-sel/*/values.yaml; do
                grep -q "system-pool" "$vfile" 2>/dev/null && { found=true; break; }
              done
              [ "$found" = "true" ] || { echo "system-pool not found" >&2; exit 1; }
            check:
              ($error == null): true

    - name: accelerated-node-selector
      description: --accelerated-node-selector injects selector into component values.
      try:
        - script:
            content: |
              EIDOS_BIN="${EIDOS_BIN:?Set EIDOS_BIN to the path of the eidos binary}"
              WORK="/tmp/chainsaw-bundle-variants"
              ${EIDOS_BIN} bundle -r "${WORK}/recipe.yaml" -o "${WORK}/accel-sel" \
                --accelerated-node-selector accelerator=nvidia-gpu
              found=false
              for vfile in "${WORK}"/accel-sel/*/values.yaml; do
                grep -q "nvidia-gpu" "$vfile" 2>/dev/null && { found=true; break; }
              done
              [ "$found" = "true" ] || { echo "nvidia-gpu not found" >&2; exit 1; }
            check:
              ($error == null): true

    - name: system-node-toleration
      description: --system-node-toleration injects toleration into component values.
      try:
        - script:
            content: |
              EIDOS_BIN="${EIDOS_BIN:?Set EIDOS_BIN to the path of the eidos binary}"
              WORK="/tmp/chainsaw-bundle-variants"
              ${EIDOS_BIN} bundle -r "${WORK}/recipe.yaml" -o "${WORK}/sys-tol" \
                --system-node-toleration dedicated=system-workload:NoSchedule
              found=false
              for vfile in "${WORK}"/sys-tol/*/values.yaml; do
                grep -q "system-workload" "$vfile" 2>/dev/null && { found=true; break; }
              done
              [ "$found" = "true" ] || { echo "system-workload not found" >&2; exit 1; }
            check:
              ($error == null): true

    - name: accelerated-node-toleration
      description: --accelerated-node-toleration injects nvidia.com/gpu toleration.
      try:
        - script:
            content: |
              EIDOS_BIN="${EIDOS_BIN:?Set EIDOS_BIN to the path of the eidos binary}"
              WORK="/tmp/chainsaw-bundle-variants"
              ${EIDOS_BIN} bundle -r "${WORK}/recipe.yaml" -o "${WORK}/accel-tol" \
                --accelerated-node-toleration nvidia.com/gpu=present:NoSchedule
              found=false
              for vfile in "${WORK}"/accel-tol/*/values.yaml; do
                grep -q "nvidia.com/gpu" "$vfile" 2>/dev/null && { found=true; break; }
              done
              [ "$found" = "true" ] || { echo "nvidia.com/gpu not found" >&2; exit 1; }
            check:
              ($error == null): true

    - name: value-override
      description: --set flag injects custom driver version into gpu-operator values.
      try:
        - script:
            content: |
              EIDOS_BIN="${EIDOS_BIN:?Set EIDOS_BIN to the path of the eidos binary}"
              WORK="/tmp/chainsaw-bundle-variants"
              ${EIDOS_BIN} bundle -r "${WORK}/recipe.yaml" -o "${WORK}/value-override" \
                --set gpu-operator:driver.version=999.99.99
              found=false
              for vfile in "${WORK}"/value-override/*/values.yaml; do
                grep -q "999.99.99" "$vfile" 2>/dev/null && { found=true; break; }
              done
              [ "$found" = "true" ] || { echo "999.99.99 not found" >&2; exit 1; }
            check:
              ($error == null): true

    - name: combined-flags
      description: All scheduling/override flags combined in one bundle.
      try:
        - script:
            content: |
              EIDOS_BIN="${EIDOS_BIN:?Set EIDOS_BIN to the path of the eidos binary}"
              WORK="/tmp/chainsaw-bundle-variants"
              ${EIDOS_BIN} bundle -r "${WORK}/recipe.yaml" -o "${WORK}/combined" \
                --system-node-selector nodeGroup=system-pool \
                --system-node-toleration dedicated=system:NoSchedule \
                --accelerated-node-selector accelerator=nvidia-gpu \
                --accelerated-node-toleration nvidia.com/gpu=present:NoSchedule \
                --set gpu-operator:driver.version=888.88.88
              for pattern in nodeGroup dedicated accelerator nvidia.com/gpu 888.88.88; do
                found=false
                for vfile in "${WORK}"/combined/*/values.yaml; do
                  grep -q "$pattern" "$vfile" 2>/dev/null && { found=true; break; }
                done
                [ "$found" = "true" ] || { echo "$pattern not found" >&2; exit 1; }
              done
            check:
              ($error == null): true

    - name: argocd-deployer
      description: --deployer argocd produces app-of-apps structure with sync-wave.
      try:
        - script:
            content: |
              EIDOS_BIN="${EIDOS_BIN:?Set EIDOS_BIN to the path of the eidos binary}"
              WORK="/tmp/chainsaw-bundle-variants"
              ${EIDOS_BIN} bundle -r "${WORK}/recipe.yaml" -o "${WORK}/argocd" \
                --deployer argocd
              test -f "${WORK}/argocd/app-of-apps.yaml"
              grep -q "kind: Application" "${WORK}/argocd/app-of-apps.yaml"
              # Verify at least one component has application.yaml with sync-wave
              found=false
              for dir in "${WORK}"/argocd/*/; do
                if [ -f "${dir}application.yaml" ]; then
                  grep -q "argocd.argoproj.io/sync-wave" "${dir}application.yaml" && { found=true; break; }
                fi
              done
              [ "$found" = "true" ] || { echo "No component with sync-wave found" >&2; exit 1; }
            check:
              ($error == null): true
      cleanup:
        - script:
            content: |
              rm -rf /tmp/chainsaw-bundle-variants
