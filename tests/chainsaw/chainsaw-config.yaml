# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/configuration-chainsaw-v1alpha2.json
apiVersion: chainsaw.kyverno.io/v1alpha2
kind: Configuration
metadata:
  name: aicr-e2e
spec:
  timeouts:
    apply: 30s
    assert: 120s
    cleanup: 30s
    delete: 30s
    error: 10s
    exec: 60s
  execution:
    parallel: 4
    failFast: true
  cleanup:
    skipDelete: false
  report:
    format: JUNIT-TEST
    name: aicr-e2e
