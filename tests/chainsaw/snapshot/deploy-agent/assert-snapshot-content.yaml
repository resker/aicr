# Structural assertion for the snapshot YAML content.
#
# Used with: chainsaw assert --resource /tmp/snapshot.yaml --file assert-snapshot-content.yaml
#
# Chainsaw does partial matching on maps -- we specify the fields we care about
# and Chainsaw verifies they exist with the expected values. For arrays,
# Chainsaw requires exact length so we list all items.
kind: Snapshot
apiVersion: aicr.nvidia.com/v1alpha1
metadata:
  source-node: aicr-worker
  version: dev
measurements:
  - type: OS
    subtypes:
      - subtype: grub
      - subtype: sysctl
      - subtype: kmod
      - subtype: release
  - type: SystemD
    subtypes:
      - subtype: containerd.service
      - subtype: docker.service
      - subtype: kubelet.service
  - type: GPU
    subtypes:
      - subtype: smi
        data:
          gpu.model: NVIDIA B200
          driver: "560.35.03"
          gpu-count: 8
          gpu.product-architecture: Blackwell
  - type: K8s
    subtypes:
      - subtype: server
      - subtype: image
      - subtype: policy
      - subtype: node
