# Snapshot agent Job that runs aicr snapshot and writes to a ConfigMap.
# Extracted from test_snapshot() in tests/e2e/run.sh lines 621-674.
#
# Prerequisites:
#   - Kind cluster with fake nvidia-smi injected into worker nodes
#   - RBAC created (rbac.yaml applied)
#   - AICR image pushed to local registry (localhost:5001/aicr:local)
apiVersion: batch/v1
kind: Job
metadata:
  name: aicr-e2e-snapshot
  namespace: gpu-operator
spec:
  completions: 1
  backoffLimit: 0
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: aicr
      restartPolicy: Never
      nodeSelector:
        kubernetes.io/os: linux
      hostPID: true
      hostNetwork: true
      containers:
        - name: aicr
          image: localhost:5001/aicr:local
          command: ["aicr"]
          args: ["snapshot", "-o", "cm://gpu-operator/aicr-e2e-snapshot"]
          env:
            - name: AICR_LOG_PREFIX
              value: agent
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            privileged: true
            runAsUser: 0
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: run-systemd
              mountPath: /run/systemd
              readOnly: true
            - name: nvidia-smi
              mountPath: /usr/bin/nvidia-smi
              readOnly: true
      volumes:
        - name: tmp
          emptyDir: {}
        - name: run-systemd
          hostPath:
            path: /run/systemd
            type: Directory
        - name: nvidia-smi
          hostPath:
            path: /usr/local/bin/nvidia-smi
            type: File
