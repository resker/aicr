# ctlptl configuration for KWOK-based cluster simulation
#
# Creates a minimal Kind cluster (control-plane only) with KWOK for simulated GPU nodes.
# KWOK provides lightweight fake nodes that appear real to the Kubernetes API,
# enabling validation of node selectors, tolerations, and scheduling without hardware.
#
# Usage:
#   ctlptl apply -f .ctlptl-kwok.yaml   # Create cluster + registry
#   ctlptl delete -f .ctlptl-kwok.yaml  # Delete cluster + registry
#
# Or use Makefile targets:
#   make kwok-cluster         # Create cluster, install KWOK
#   make kwok-cluster-delete  # Delete cluster

apiVersion: ctlptl.dev/v1alpha1
kind: Registry
name: ctlptl-registry
port: 5001
---
apiVersion: ctlptl.dev/v1alpha1
kind: Cluster
product: kind
name: kind-aicr-kwok
registry: ctlptl-registry
kindV1Alpha4Cluster:
  # Control-plane only - KWOK provides simulated worker nodes
  nodes:
    - role: control-plane
