kind: RecipeMetadata
apiVersion: aicr.nvidia.com/v1alpha1
metadata:
  name: dgxc-teleport

spec:
  # Inherits from eks-training (adds teleport on top of EKS training stack)
  base: eks-training

  criteria:
    service: eks
    intent: training

  componentRefs:
    - name: dgxc-teleport
      type: Kustomize
      valuesFile: components/dgxc-teleport/values.yaml
