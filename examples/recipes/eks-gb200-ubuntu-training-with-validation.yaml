# Example recipe demonstrating multi-phase validation configuration
# This shows how to configure validation checks for different deployment phases

kind: RecipeResult
apiVersion: aicr.nvidia.com/v1alpha1
metadata:
  version: v0.26.7-next
  appliedOverlays:
    - base
    - eks
    - eks-training
    - gb200-eks-training
    - gb200-eks-ubuntu-training

criteria:
  service: eks
  accelerator: gb200
  intent: training
  os: ubuntu

# Constraints validated during readiness phase
constraints:
  - name: K8s.server.version
    value: '>= 1.32.4'
    severity: error
    remediation: "Upgrade Kubernetes to version 1.32.4 or later"
  - name: OS.release.ID
    value: ubuntu
    severity: error
    remediation: "Use Ubuntu as the operating system"
  - name: OS.release.VERSION_ID
    value: "24.04"
    severity: warning
    remediation: "Ubuntu 24.04 is recommended for optimal compatibility"
  - name: OS.sysctl./proc/sys/kernel/osrelease
    value: '>= 6.8'
    severity: error
    remediation: "Upgrade kernel to version 6.8 or later"

# Multi-phase validation configuration
validation:
  # Readiness phase: Validate infrastructure before installing components
  readiness:
    checks:
      - gpu-hardware-detection
      - kernel-parameters
      - os-prerequisites

  # Deployment phase: Validate component deployment
  deployment:
    constraints:
      - name: gpu-operator.version
        value: "== v25.10.1"
        severity: warning
        remediation: "Update GPU Operator to v25.10.1"
    checks:
      - operator-health
      - expected-resources

  # Performance phase: Validate system performance
  performance:
    infrastructure: nccl-doctor
    checks:
      - nccl-bandwidth-test
      - fabric-health-check

  # Conformance phase: Validate workload-specific requirements
  # (not configured in this example - will be skipped)

componentRefs:
  - name: cert-manager
    namespace: cert-manager
    chart: cert-manager
    type: Helm
    source: https://charts.jetstack.io
    version: v1.17.2
    valuesFile: components/cert-manager/values.yaml

  - name: gpu-operator
    namespace: gpu-operator
    chart: gpu-operator
    type: Helm
    source: https://helm.ngc.nvidia.com/nvidia
    version: v25.3.3
    valuesFile: components/gpu-operator/values-eks-training.yaml
    expectedResources:
      - kind: Deployment
        name: gpu-operator
        namespace: gpu-operator
      - kind: DaemonSet
        name: nvidia-driver-daemonset
        namespace: gpu-operator
      - kind: DaemonSet
        name: nvidia-device-plugin-daemonset
        namespace: gpu-operator
    overrides:
      cdi:
        default: false
        enabled: true
      driver:
        kernelModuleConfig:
          name: kernel-module-params
        version: 580.82.07
      gdrcopy:
        enabled: true
    dependencyRefs:
      - cert-manager

  - name: nvidia-dra-driver-gpu
    namespace: nvidia-system
    chart: nvidia-dra-driver-gpu
    type: Helm
    source: https://helm.ngc.nvidia.com/nvidia
    version: 25.8.1
    valuesFile: components/nvidia-dra-driver-gpu/values.yaml
    dependencyRefs:
      - gpu-operator

  - name: nvsentinel
    namespace: nvidia-system
    chart: nvsentinel
    type: Helm
    source: oci://ghcr.io/nvidia
    version: v0.6.0
    valuesFile: components/nvsentinel/values.yaml
    dependencyRefs:
      - cert-manager

  - name: skyhook-operator
    namespace: skyhook
    chart: skyhook-operator
    type: Helm
    source: https://helm.ngc.nvidia.com/nvidia/skyhook
    version: 0.11.1
    valuesFile: components/skyhook-operator/values.yaml
    overrides:
      customization: ubuntu

deploymentOrder:
  - cert-manager
  - kube-prometheus-stack
  - gpu-operator
  - nvidia-dra-driver-gpu
  - nvsentinel
  - skyhook-operator
