kind: RecipeMetadata
apiVersion: aicr.nvidia.com/v1alpha1
metadata:
  name: h100-aks-ubuntu-training-kubeflow

spec:
  # Inherits from h100-aks-ubuntu-training recipe (H100 + AKS + Ubuntu + training settings)
  # This overlay adds Kubeflow Training Operator for distributed training with TrainJob
  base: h100-aks-ubuntu-training

  criteria:
    service: aks
    accelerator: h100
    os: ubuntu
    intent: training
    platform: kubeflow

  # Constraints for H100 on AKS with Ubuntu for Kubeflow training workloads
  # Constraint names use fully qualified measurement paths: {type}.{subtype}.{key}
  constraints:
    - name: K8s.server.version
      value: ">= 1.32.4"
    - name: OS.release.ID
      value: ubuntu
    - name: OS.release.VERSION_ID
      value: "24.04"
    - name: OS.sysctl./proc/sys/kernel/osrelease
      value: ">= 6.8"

  # Kubeflow Training Operator for TrainJob support
  componentRefs:
    - name: kubeflow-trainer
      type: Helm
      valuesFile: components/kubeflow-trainer/values.yaml
      manifestFiles:
        - components/kubeflow-trainer/manifests/torch-distributed-cluster-training-runtime.yaml
      dependencyRefs:
        - cert-manager
        - kube-prometheus-stack
        - gpu-operator
