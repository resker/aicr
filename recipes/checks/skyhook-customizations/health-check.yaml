# Skyhook Customizations Health Check
#
# Validates that the Skyhook custom resource(s) deployed by the skyhook-customizations
# component have completed successfully. The Skyhook CR status.status (see
# github.com/NVIDIA/skyhook/chart/templates/skyhook-crd.yaml) is one of: unknown,
# complete, blocked, waiting, disabled, paused, in_progress, erroring. This check
# asserts status.status is "complete" so that node-level customizations (e.g. tuning)
# have been applied to all matching nodes.
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: skyhook-customizations-health-check
spec:
  timeouts:
    assert: 5m
  steps:
    - name: validate-skyhook-cr-complete
      try:
        # Assert the Skyhook CR (e.g. tuning) in the skyhook namespace has
        # status.status == "complete" per the Skyhook CRD schema.
        - assert:
            resource:
              apiVersion: skyhook.nvidia.com/v1alpha1
              kind: Skyhook
              metadata:
                name: tuning
              status:
                status: complete
